<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>CRUD</title>
</head>

<body>
    <h2>Cadastro de Usuários</h2>
    <form action="/usuario/inserir" method="POST">
        Código: <input type="number" name="codigo" required><br><br>
        Login: <input type="text" name="login" required><br><br>
        Senha: <input type="password" name="senha" required><br><br>
        Sexo:
        <input type="radio" name="sexo" value="M" checked> M
        <input type="radio" name="sexo" value="F"> F<br><br>
        <button type="submit">Cadastrar</button>
    </form>

    <hr>
    <h2>Ações</h2>
    <a href="/usuario/listar"><button>Listar todos os usuários</button></a>
</body>

</html>
